<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Happy Birthday Pooja ❤️
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- Animated Background -->

<div class="gradient"></div>

<div
id="particles">
</div>

<!-- Intro -->

<section
id="intro"
class="page active">

<div class="glass">

<h3>

✨ A Special Surprise ✨

</h3>

<h1>

For

<br>

Pooja 💖

</h1>

<div
id="gift">

🎁

</div>

<p>

Tap the Gift

</p>

</div>

</section>

<!-- Birthday Page -->

<section
id="birthday"
class="page">

<div class="glass">

<h1>

Happy Birthday

<br>

Pooja 💗

</h1>

<div
class="cake"
id="cake">

🎂

<div
id="flame">

🔥

</div>

</div>

<div
id="wish">

</div>

<button
id="musicBtn">

🎵 Music

</button>

<div
id="from">

❤️ From Chetender ❤️

</div>

</div>

</section>

<audio
id="music"
loop>

<source
src="assets/music.mp3"
type="audio/mpeg">

</audio>

<script src="script.js">

</script>
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎵 Play Music</button>

<script>
function playMusic() {
    document.getElementById("bgMusic").play();
}
</script>

</body>

</html>
